name: Release Beta

# Beta release-candidate workflow (sibling of release.yml / release-alpha.yml).
#
# Triggered by:
#   - Pushing a tag matching v*-beta* (e.g. v0.9.0-beta, v0.9.0-beta.1, v0.9.0-beta.rc1)
#   - Manual dispatch from the GitHub UI for smoke-testing
#
# Netplay-only, US-only. Artifacts bake
# -DSSB64_NETPLAY_AUTOMATCH_STAGE_KIND_DEFAULT=6 so automatch hosts always pick
# Dream Land (nGRKindPupupu). Runtime env SSB64_NETPLAY_AUTOMATCH_STAGE_KIND
# still overrides the compile default on the automatch host.

on:
  push:
    tags:
      - 'v*-beta*'
  workflow_dispatch:    # manual trigger; no Release is created on dispatch-only runs

env:
  # Netplay-only: compile-time automatch host stage (Dream Land).
  SSB64_EXTRA_CMAKE_ARGS: -DSSB64_NETPLAY_AUTOMATCH_STAGE_KIND_DEFAULT=6
  SSB64_ANDROID_AUTOMATCH_STAGE_KIND_DEFAULT: "6"
  SSB64_VERSION: us

permissions:
  contents: write       # softprops/action-gh-release needs this on the
                        # final job to attach assets and create the
                        # Release. Read-only on every other step.

jobs:
  build-macos-netplay:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install build deps
        run: |
          brew install cmake ninja \
            sdl2 glew libzip nlohmann-json tinyxml2 spdlog curl \
            zip create-dmg dylibbundler ca-certificates
          python3 -m pip install --break-system-packages Pillow
      - name: Package macOS netplay .app + .dmg
        env:
          SSB64_VERSION: us
          SSB64_EXTRA_CMAKE_ARGS: ${{ env.SSB64_EXTRA_CMAKE_ARGS }}
        run: bash scripts/package-macos.sh --netplay
      - uses: actions/upload-artifact@v4
        with:
          name: BattleShip-macos-netplay
          path: dist/BattleShip-Netplay.dmg
          if-no-files-found: error

  build-linux-netplay:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build zip clang \
            libsdl2-dev libzip-dev libglew-dev \
            nlohmann-json3-dev libtinyxml2-dev libspdlog-dev \
            libcurl4-openssl-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            python3 python3-pil imagemagick file
          sudo touch /usr/bin/zipcmp /usr/bin/zipmerge /usr/bin/ziptool
          sudo chmod +x /usr/bin/zipcmp /usr/bin/zipmerge /usr/bin/ziptool
      - name: Use clang as the C/C++ compiler
        run: |
          echo "CC=clang"   >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
      - name: Install AppImage tooling
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
            -O /usr/local/bin/linuxdeploy
          chmod +x /usr/local/bin/appimagetool /usr/local/bin/linuxdeploy
      - name: Package Linux netplay AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          SSB64_VERSION: us
          SSB64_EXTRA_CMAKE_ARGS: ${{ env.SSB64_EXTRA_CMAKE_ARGS }}
        run: bash scripts/package-linux.sh --netplay
      - uses: actions/upload-artifact@v4
        with:
          name: BattleShip-linux-netplay
          path: dist/BattleShip-Netplay-x86_64.AppImage
          if-no-files-found: error

  build-android-netplay:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Pillow for CSS asset baking
        run: sudo apt-get update && sudo apt-get install -y python3-pil
      - name: Install Android SDK + NDK r29
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;29.0.14206865'
      - name: Generate f3d.o2r (open-source Fast3D shaders bundled in APK)
        working-directory: libultraship/src/fast
        run: cmake -E tar cf "$GITHUB_WORKSPACE/f3d.o2r" --format=zip shaders
      - name: Decode release keystore (if configured via secrets)
        env:
          SSB64_ANDROID_KEYSTORE_BASE64: ${{ secrets.SSB64_ANDROID_KEYSTORE_BASE64 }}
          SSB64_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.SSB64_ANDROID_KEYSTORE_PASSWORD }}
          SSB64_ANDROID_KEY_ALIAS: ${{ secrets.SSB64_ANDROID_KEY_ALIAS }}
          SSB64_ANDROID_KEY_PASSWORD: ${{ secrets.SSB64_ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$SSB64_ANDROID_KEYSTORE_BASE64" ]; then
            echo "::warning::No release keystore secret configured; falling back to debug signing"
            exit 0
          fi
          echo "$SSB64_ANDROID_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/release.jks"
          {
            echo "SSB64_RELEASE_KEYSTORE=$GITHUB_WORKSPACE/release.jks"
            echo "SSB64_RELEASE_KEYSTORE_PASSWORD=$SSB64_ANDROID_KEYSTORE_PASSWORD"
            echo "SSB64_RELEASE_KEY_ALIAS=$SSB64_ANDROID_KEY_ALIAS"
            echo "SSB64_RELEASE_KEY_PASSWORD=$SSB64_ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"
      - name: Clear stale Android CMake/FetchContent cache
        run: rm -rf android/app/.cxx
      - name: Build netplay APK
        working-directory: android
        run: ./gradlew --no-daemon assembleRelease -Pssb64Netmenu=true -Pssb64AutomatchStageKindDefault=${{ env.SSB64_ANDROID_AUTOMATCH_STAGE_KIND_DEFAULT }}
      - name: Verify APK native libraries
        run: |
          apk="$(find android/app/build/outputs/apk/release -name 'app-release*.apk' | head -n 1)"
          test -n "$apk" -a -f "$apk"
          for lib in libSDL2.so libmain.so libtorch_runner.so libc++_shared.so; do
            unzip -l "$apk" "lib/arm64-v8a/$lib" >/dev/null || {
              echo "::error::missing lib/arm64-v8a/$lib in $apk"
              unzip -l "$apk" 'lib/*/*.so' || true
              exit 1
            }
          done
          echo "jniLibs OK: libSDL2.so libmain.so libtorch_runner.so libc++_shared.so"
      - name: Stage release APK under a stable name
        run: |
          mkdir -p dist
          shopt -s nullglob
          apk=(android/app/build/outputs/apk/release/app-release*.apk)
          if (( ${#apk[@]} == 0 )); then
            echo "::error::no APK produced under android/app/build/outputs/apk/release/"
            ls -la android/app/build/outputs/apk/release/ || true
            exit 1
          fi
          cp "${apk[0]}" dist/BattleShip-android-netplay.apk
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: BattleShip-android-netplay
          path: dist/BattleShip-android-netplay.apk
          if-no-files-found: error

  build-windows-netplay:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install build deps
        run: |
          choco install ninja -y
          python -m pip install --upgrade pip
          python -m pip install Pillow
        shell: pwsh
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: '2022'
      - name: Package Windows netplay zip
        env:
          SSB64_VERSION: us
          SSB64_EXTRA_CMAKE_ARGS: ${{ env.SSB64_EXTRA_CMAKE_ARGS }}
        run: ./scripts/package-windows.ps1 -Netplay
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: BattleShip-windows-netplay
          path: dist/BattleShip-Netplay-windows.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release (Beta)
    needs:
      [
        build-macos-netplay,
        build-linux-netplay,
        build-windows-netplay,
        build-android-netplay,
      ]
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'beta')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/BattleShip-Netplay.dmg
            artifacts/BattleShip-Netplay-x86_64.AppImage
            artifacts/BattleShip-Netplay-windows.zip
            artifacts/BattleShip-android-netplay.apk
          generate_release_notes: true
          draft: true
          name: Beta Release Candidate
          body: |
            Beta RC **netplay / US only**. Automatch is forced to **Dream Land**
            (compile-time default). Set `SSB64_NETPLAY_AUTOMATCH_STAGE_KIND` at
            runtime to override on the automatch host.

            **Artifacts:**
            - Linux: `BattleShip-Netplay-x86_64.AppImage`
            - Windows: `BattleShip-Netplay-windows.zip`
            - macOS: `BattleShip-Netplay.dmg`
            - Android: `BattleShip-android-netplay.apk`
