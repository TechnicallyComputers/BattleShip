name: README stats

# GitHub renders README images as static assets, so the charts under
# assets/readme-stats are regenerated and committed by this workflow.
# Star timestamps are available directly from the stargazers API. Release
# download timestamps are not, so the downloads chart uses current asset
# counts grouped by release tag, platform, and ROM region.

on:
  workflow_dispatch:
  schedule:
    - cron: '23 8 * * *'
  release:
    types: [published, edited, deleted]
  push:
    branches: [main]
    paths:
      - '.github/workflows/readme-stats.yml'
      - 'tools/generate_readme_stats.py'
      - 'README.md'

permissions:
  contents: write

concurrency:
  group: readme-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Generate README charts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 tools/generate_readme_stats.py --repo "$GITHUB_REPOSITORY"
      - name: Commit chart updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A assets/readme-stats
          if git diff --cached --quiet; then
            echo "README stats are already up to date."
            exit 0
          fi
          git commit -m "Update README stats charts"
          git push
